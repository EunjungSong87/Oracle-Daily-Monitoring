<!-- modifyDbms.html -->

<style>
    /* modifyDbms.html에 해당하는 CSS 스타일 */

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
    }

        h1 {
            background-color: #343a40;
            color: #ffffff;
            padding: 20px;
            margin: 0;
    }

    form {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        background-color: #fff;
        border: 1px solid #ddd;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input[type="text"],
    textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }

    button {
        background-color: #333;
        color: #fff;
        padding: 10px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        margin-right: 10px; /* 추가된 부분: 뒤로가기 버튼과의 간격을 조절합니다. */
    }

    button:hover {
        background-color: #555;
    }

</style>

<!-- 페이지 상단에 표시되는 제목입니다. -->
<h1>Modify DBMS Info</h1>

<!-- DBMS 추가 폼입니다. -->
<form id="modify-dbms" onsubmit="modifyDbms(event)">
    <label for="ID">ID:</label>
    <input type="number" id="ID" name="ID" required><br>

    <label for="DBMS">DBMS:</label>
    <input type="text" id="DBMS" name="DBMS" required><br>

    <label for="USERNAME">USERNAME:</label>
    <input type="text" id="USERNAME" name="USERNAME" required><br>

    <label for="PASSWORD">PASSWORD:</label>
    <input type="text" id="PASSWORD" name="PASSWORD" required><br>

    <label for="SID">SID:</label>
    <input type="text" id="SID" name="SID" required><br>

    <label for="IP">IP:</label>
    <input type="text" id="IP" name="IP" required><br>

    <label for="PORT">PORT:</label>
    <input type="text" id="PORT" name="PORT" required><br>

    <label for="MEMO">MEMO:</label>
    <textarea id="MEMO" name="MEMO" ></textarea><br>

    <!-- 게시글 작성 버튼 -->
    <button type="submit">수정 완료</button>

    <!-- 뒤로가기 버튼 -->
    <button onclick="goBack()">뒤로 가기</button>
</form>

<!-- 게시글 작성 스크립트 파일을 로드합니다. -->
<script>
    window.onload = function () {
        const data = JSON.parse(localStorage.getItem("editData"));
        //console.log( data);
        document.getElementById('ID').value = data.id;
        document.getElementById('DBMS').value = data.dbname;
        document.getElementById('USERNAME').value = data.username;
        document.getElementById('PASSWORD').value = data.password;
        document.getElementById('SID').value = data.sid;
        document.getElementById('IP').value = data.ip;
        document.getElementById('PORT').value = data.port;
        document.getElementById('MEMO').value = data.memo;

    };

    
    async function modifyDbms(evnet) {
        event.preventDefault();
        const data = JSON.parse(localStorage.getItem("editData"));
        const id       =  document.getElementById('ID'); 
        const dbName   =  document.getElementById('DBMS');
        const userName =  document.getElementById('USERNAME');
        const passWord =  document.getElementById('PASSWORD');
        const sid    =    document.getElementById('SID');
        const ip     =    document.getElementById('IP');
        const port   =    document.getElementById('PORT');
        const memo   =    document.getElementById('MEMO');

        
        if (!id.value || !dbName.value || !userName.value || !passWord.value || !sid.value || !ip.value || !port.value) {
            alert('Please input DBMS INFO.');
            return;
        }

        const dbConfig = {
            id : id.value, 
            dbname: dbName.value,
            username: userName.value,
            password: passWord.value,
            sid: sid.value,
            ip: ip.value,
            port: port.value,
            memo: memo.value
        };

        try {
            const response = await fetch('/api/modifyDbms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dbConfig)
            });

            if (response.ok) {
                alert('DBMS 수정 완료.');
                window.location.href = 'index.html'
            } else {
                alert(`Request failed: ${response.status}`);
            }
        } catch (error) {
            console.error('Error:', error.message);
            alert('An error occurred while sending the POST request.');
        }
    }

    function goBack() {
        window.history.back();
    }
</script>
