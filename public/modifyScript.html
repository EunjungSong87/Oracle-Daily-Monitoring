<!-- modifyDbms.html -->

<style>
    /* modifyDbms.html에 해당하는 CSS 스타일 */

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
    }

        h1 {
            background-color: #343a40;
            color: #ffffff;
            padding: 20px;
            margin: 0;
    }

    form {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        background-color: #fff;
        border: 1px solid #ddd;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input[type="text"],
    textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }

    button {
        background-color: #333;
        color: #fff;
        padding: 10px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        margin-right: 10px; /* 추가된 부분: 뒤로가기 버튼과의 간격을 조절합니다. */
    }

    button:hover {
        background-color: #555;
    }

    #SQL_TEXT {
        width: 100%;
        height: 300px;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

        box-sizing: border-box;
        }

</style>

<!-- 페이지 상단에 표시되는 제목입니다. -->
<a href="index.html">
<h1>Modify DBMS Info</h1>
</a> 

<!-- DBMS 추가 폼입니다. -->
<form id="modify-dbms" onsubmit="modifyDbms(event)">
    <label for="ID">ID:</label>
    <input type="number" id="ID" name="ID" required><br>

    <label for="NAME">NAME:</label>
    <input type="text" id="NAME" name="NAME" required><br>

    <label for="CATEGORY">CATEGORY:</label>
    <input type="text" id="CATEGORY" name="CATEGORY" required><br>

    <label for="DESCRIPTION">DESCRIPTION:</label>
    <input type="text" id="DESCRIPTION" name="DESCRIPTION" required><br>

    <label for="SID">SQL_TEXT:</label>
    <textarea type="text" id="SQL_TEXT" name="SQL_TEXT" required></textarea><br>

    <label for="SCHEDULE">SCHEDULE:</label>
    <input type="text" id="SCHEDULE" name="SCHEDULE" required><br>

    <label for="IS_ACTIVE">IS_ACTIVE:</label>
    <input type="text" id="IS_ACTIVE" name="IS_ACTIVE" required><br>

    <!-- 게시글 작성 버튼 -->
    <button onclick="modifyScript()">수정 완료</button>

    <!-- 뒤로가기 버튼 -->
    <button onclick="goBack()">뒤로 가기</button>
</form>

<!-- 게시글 작성 스크립트 파일을 로드합니다. -->
<script>

    // 기존의 값 가져와 서 세팅 하기 
     window.onload = async function () {
        const data = JSON.parse(localStorage.getItem("editData"));
        console.log ( data ) ; 
        const scriptConfig = { id : data.id , name : data.name }; 
        console.log ( scriptConfig ) ; 
        const sqlText = await getSqlText(scriptConfig);
        
        document.getElementById('ID').value = data.id;
        document.getElementById('NAME').value = data.name;
        document.getElementById('CATEGORY').value = data.category;
        document.getElementById('DESCRIPTION').value = data.description;
        document.getElementById('SQL_TEXT').value = sqlText;
        document.getElementById('SCHEDULE').value = data.schedule;
        document.getElementById('IS_ACTIVE').value = data.is_active;

    };

    async function getSqlText(scriptConfig) {

        try {
            const response =  await fetch('/api/getSqlText', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(scriptConfig)
            });

            if (response.ok) {
                const result = await response.json();
                const sqlText = Object.values(result);
                //alert('Script SQL 가져오기 완료 .');
                console.log( '화면', sqlText[1] ); 
                return sqlText[1] ;
            } else {
                alert(`Request failed: ${response.status}`);
            }
        } catch (error) {
            console.error('Error:', error.message);
            alert('An error occurred while sending the POST request.');
        }
    } 

    async function modifyScript() {

        console.log( 'modifyScript'); 
        event.preventDefault();
        const data = JSON.parse(localStorage.getItem("editData"));

        const id          =  document.getElementById('ID'); 
        const name        =  document.getElementById('NAME');
        const category    =  document.getElementById('CATEGORY');
        const description =  document.getElementById('DESCRIPTION');
        const sql_text    =  document.getElementById('SQL_TEXT');
        const schedule    =  document.getElementById('SCHEDULE');
        const is_active   =  document.getElementById('IS_ACTIVE');
        
        if (!id.value || !name.value || !sql_text.value || !is_active.value ) {
            alert('Please input Script INFO.');
            return;
        }

        const scriptConfig = {
            id          : id.value, 
            name        : name.value,
            category    : category.value,
            description : description.value,
            sql_text    : sql_text.value,
            schedule    : schedule.value,
            is_active   : is_active.value
        };

        try {
            const response = await fetch('/api/modifyScript', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(scriptConfig)
            });

            if (response.ok) {
                alert('Script 수정 완료.');
                window.location.href = 'monitoringScript.html'
            } else {
                alert(`Request failed: ${response.status}`);
            }
        } catch (error) {
            console.error('Error:', error.message);
            alert('An error occurred while sending the POST request.');
        }
    }

    function goBack() {
        window.history.back();
    }
</script>
